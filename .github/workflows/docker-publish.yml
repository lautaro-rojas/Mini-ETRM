# .github/workflows/docker-publish.yml
name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ] # Se dispara solo cuando hacés push a main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Docker Buildx (permite builds más rápidos y eficientes)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Loguearse en Docker Hub usando los secretos
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Construir la imagen y subirla (Push)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Etiquetamos como 'latest' y también con el ID del commit para trazabilidad
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/minietrm-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/minietrm-api:${{ github.sha }}